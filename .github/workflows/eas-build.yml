name: EAS Build

on:
  push:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build for"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ios
          - android

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

  check-secrets:
    name: Check Expo token
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      has_expo_token: ${{ steps.check.outputs.has_expo_token }}
    steps:
      - id: check
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -n "$EXPO_TOKEN" ]; then
            echo "has_expo_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_expo_token=false" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN is not set; EAS build jobs will be skipped."
          fi

  build-android:
    name: Queue Android APK
    runs-on: ubuntu-latest
    needs:
      - validate
      - check-secrets
    if: >-
      ${{
        needs.check-secrets.outputs.has_expo_token == 'true' &&
        (
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' &&
            (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'))
        )
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Queue Android build (Preview)
        run: eas build --platform android --profile preview --non-interactive --no-wait

  build-ios:
    name: Queue iOS Simulator
    runs-on: ubuntu-latest
    needs:
      - validate
      - check-secrets
    if: >-
      ${{
        needs.check-secrets.outputs.has_expo_token == 'true' &&
        (
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' &&
            (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios'))
        )
      }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Queue iOS simulator build (CI)
        run: eas build --platform ios --profile preview-simulator --non-interactive --no-wait
